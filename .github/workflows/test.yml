name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Fast unit tests (no atlas file required) ──────────────────────────────
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r project/requirements-min.txt pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest project/tests/unit/ -v --tb=short --cov=project/scripts --cov-report=term-missing

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check project/scripts/ project/frontend/blueprints/ project/frontend/server_context.py

      - name: Run ruff format check
        run: ruff format --check project/scripts/ project/frontend/blueprints/ project/frontend/server_context.py

  # ── Integration tests (self-hosted, has atlas file) ───────────────────────
