name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI (e.g. to run integration tests)

jobs:
  # ── Fast unit tests (no atlas file required) ──────────────────────────────
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r project/requirements-min.txt pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest project/tests/unit/ -v --tb=short --cov=project/scripts --cov-report=term-missing --cov-fail-under=20

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check project/scripts/ project/frontend/blueprints/ project/frontend/server_context.py

      - name: Run ruff format check
        run: ruff format --check project/scripts/ project/frontend/blueprints/ project/frontend/server_context.py

  # ── Integration tests (self-hosted, has atlas file) ───────────────────────
  # Requires a self-hosted runner registered with the label "brainfast"
  # that has annotation_25.nii.gz on disk.
  #
  # To register a runner:
  #   GitHub → Settings → Actions → Runners → New self-hosted runner
  #   Run the installer, add label: brainfast
  #
  # Once registered, remove the 'if: false' guard to activate.
  integration:
    name: Integration tests (self-hosted)
    runs-on: [self-hosted, brainfast]
    if: false   # ← remove this line after registering the self-hosted runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[advanced]" pytest pytest-cov

      - name: Run integration tests
        run: |
          python -m pytest project/tests/integration/ -v --tb=short
